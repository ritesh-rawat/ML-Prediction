
<script>
  // Simulate a trained Linear Regression model
  // Price = base + (size_coef * sqft) + (room_coef * rooms) + location_bonus

  let locationMultiplier = 1.0; // suburban default

  const locationConfig = {
    rural:    { mult: 0.6,  rmse: 18420, r2: 0.81 },
    suburban: { mult: 1.0,  rmse: 22150, r2: 0.87 },
    urban:    { mult: 1.55, rmse: 31800, r2: 0.84 },
    prime:    { mult: 2.4,  rmse: 48200, r2: 0.79 },
  };

  let currentLocation = 'suburban';

  function setLocation(loc, el) {
    currentLocation = loc;
    document.querySelectorAll('.loc-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    updatePredictor();
  }

  function updatePredictor() {
    const size  = parseInt(document.getElementById('sizeSlider').value);
    const rooms = parseInt(document.getElementById('roomsSlider').value);
    const cfg   = locationConfig[currentLocation];

    document.getElementById('sizeVal').textContent  = size.toLocaleString() + ' sq ft';
    document.getElementById('roomsVal').textContent = rooms + (rooms === 1 ? ' room' : ' rooms');

    // Linear Regression formula
    const base        = 40000;
    const sizeCoef    = 112;   // $ per sq ft
    const roomCoef    = 8500;  // $ per room

    const price = (base + sizeCoef * size + roomCoef * rooms) * cfg.mult;

    document.getElementById('priceDisplay').textContent = '$' + Math.round(price).toLocaleString();
    document.getElementById('rmseVal').textContent      = '$' + cfg.rmse.toLocaleString();
    document.getElementById('r2Val').textContent        = cfg.r2.toFixed(2);

    // animation
    const box = document.getElementById('resultBox');
    box.classList.remove('updated');
    void box.offsetWidth;
    box.classList.add('updated');
    setTimeout(() => box.classList.remove('updated'), 600);
  }

  // Initial run
  updatePredictor();
</script>
